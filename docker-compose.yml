services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  api1:
    image: andre09soares/rinha-backend-2026-dotnet:v8
    environment:
      - DOTNET_GCLatencyMode=SustainedLowLatency
      - DOTNET_GCHeapCount=1
      - DOTNET_EnableDiagnostics=0
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9999/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    image: andre09soares/rinha-backend-2026-dotnet:v8
    environment:
      - DOTNET_GCLatencyMode=SustainedLowLatency
      - DOTNET_GCHeapCount=1
      - DOTNET_EnableDiagnostics=0
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9999/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

networks:
  default:
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
